---
layout: default
title: index
---

{% for post in site.posts %}

  <div class="panel">
    <div class="panel-heading">
      <div>
        <div class="row">
          <div class="col-sm-9">
            <h3 class="pull-left"><a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h3>
          </div>
          <div class="col-sm-3">
            <h4 class="pull-right">
              <small><em>{{ post.date | date: '%B %d, %Y' }}</em></small>
            </h4>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-body">
      {{ post.description }}
    </div>
  </div>

{% endfor %}
